version: "3.8"

services:
  app:
    # Image built by GitHub Actions → GHCR. Use this in Hostinger Docker Manager.
    image: ghcr.io/x-vneer/internal-system:latest
    container_name: internal-system-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - UPLOADTHING_TOKEN=${UPLOADTHING_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
      - OPEN_WEATHER_API_KEY=${OPEN_WEATHER_API_KEY}
      - APP_URL=${APP_URL}
      - PUBLIC_WEBSITE_URL=${PUBLIC_WEBSITE_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_APP_PASSWORD=${SMTP_APP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - NEXT_TELEMETRY_DISABLED=1
    labels:
      - traefik.enable=true
      # HTTPS router
      - traefik.http.routers.wahdomrania.rule=Host(`wahdomrania.com`) || Host(`www.wahdomrania.com`)
      - traefik.http.routers.wahdomrania.entrypoints=websecure
      - traefik.http.routers.wahdomrania.tls.certresolver=letsencrypt
      - traefik.http.services.wahdomrania.loadbalancer.server.port=3000
      # HTTP → HTTPS redirect
      - traefik.http.routers.wahdomrania-http.rule=Host(`wahdomrania.com`) || Host(`www.wahdomrania.com`)
      - traefik.http.routers.wahdomrania-http.entrypoints=web
      - traefik.http.routers.wahdomrania-http.middlewares=wahdomrania-redirect
      - traefik.http.middlewares.wahdomrania-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.wahdomrania-redirect.redirectscheme.permanent=true
    networks:
      - internal-system-network
      - traefik-proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  internal-system-network:
    driver: bridge
  traefik-proxy:
    external: true
